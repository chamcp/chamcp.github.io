name: Update World Cup Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Import from wheniskickoff.com (free, no auth)
        run: node scripts/import-wheniskickoff.mjs

      - name: Validate and generate data.js
        run: |
          node scripts/update-data.mjs --source=automation/matches.imported.json --validate-only
          node scripts/update-data.mjs --source=automation/matches.imported.json --skip-unchanged

      - name: Smoke test generated data
        run: node scripts/smoke-test-data.mjs

      - name: Commit data update
        run: |
          if git diff --quiet data.js; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "Auto update World Cup data"
            git push
          fi
